apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: website
data:
  nginx.conf: |
    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            charset utf-8;
            add_header Content-Type "text/html; charset=UTF-8";
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: website-content
  namespace: website
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>Aiconeak Platform</title>
        <style>
            body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
            .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; }
            h1 { color: #333; }
            a { display: block; margin: 10px 0; color: #0066cc; text-decoration: none; font-size: 18px; }
            a:hover { text-decoration: underline; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🚀 Messenger Monitoring Platform</h1>
            <p>Инфраструктура работает на Kubernetes (k3s)</p>
            <hr>
            <a href="https://chat.aiconeak.ru">💬 Мессенджер (Matrix)</a>
            <a href="https://dash.aiconeak.ru">⚙️ Dashboard Kubernetes</a>
            <a href="https://prometheus.aiconeak.ru">📊 Мониторинг (Prometheus)</a>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: content
          mountPath: /usr/share/nginx/html
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
      volumes:
      - name: content
        configMap:
          name: website-content
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: website
spec:
  selector:
    app: website
  ports:
    - port: 80