apiVersion: v1
kind: ConfigMap
metadata:
  name: dendrite-config
  namespace: messenger
data:
  dendrite.yaml: |
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dendrite-media-pvc
  namespace: messenger
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dendrite
  namespace: messenger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dendrite
  template:
    metadata:
      labels:
        app: dendrite
    spec:
      initContainers:
      - name: generate-keys
        image: matrixdotorg/dendrite-monolith:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            if [ ! -f /data/matrix_key.pem ]; then
              /usr/bin/generate-keys -private-key /data/matrix_key.pem
            fi
        volumeMounts:
        - name: data
          mountPath: /data
      containers:
      - name: dendrite
        image: matrixdotorg/dendrite-monolith:latest
        args: ["--config", "/config/dendrite.yaml", "-http-bind-address", ":8008"]
        ports:
        - containerPort: 8008
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /_matrix/client/versions
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_matrix/client/versions
            port: 8008
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: dendrite-config
      - name: data
        persistentVolumeClaim:
          claimName: dendrite-media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dendrite
  namespace: messenger
spec:
  selector:
    app: dendrite
  ports:
    - port: 8008
